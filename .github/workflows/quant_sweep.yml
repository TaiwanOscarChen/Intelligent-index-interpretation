name: Lion King Quant Sweep

on:
  schedule:
    # Run every 10 minutes on weekdays (Mon-Fri) between 01:00 and 06:00 UTC (09:00 - 14:00 Taipei time)
    # Note: GitHub Actions cron might be slightly delayed, but it's reliable enough for background jobs.
    - cron: '*/10 1-6 * * 1-5'
  
  # Allow manual trigger via API or GitHub Web UI
  workflow_dispatch:

jobs:
  run-sweep:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yfinance pandas ta pymongo

      - name: Run Global Sweep
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          python app.py --sweep
